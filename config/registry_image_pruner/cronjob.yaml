apiVersion: batch/v1
kind: CronJob
metadata:
  name: image-pruner-cronjob
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: image-pruner
            image: registry.redhat.io/rhel8/python-39:1-120.1684740828
            env:
              - name: QUAY_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: image-pruner-token
                    key: quaytoken
              - name: NAMESPACE
                valueFrom:
                  secretKeyRef:
                    name: image-pruner-token
                    key: organization
            imagePullPolicy: IfNotPresent
            command:
              - /bin/bash
              - '-c'
              - python /image-pruner/prune_images.py --namespace $(NAMESPACE)
            volumeMounts:
              - name: image-pruner-volume
                mountPath: /image-pruner
            resources:
              limits:
                cpu: 500m
                memory: 512Mi
              requests:
                cpu: 150m
                memory: 128Mi
            securityContext:
              readOnlyRootFilesystem: true
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
          volumes:
            - name: image-pruner-volume
              configMap:
                name: image-pruner-configmap
            - name: image-pruner-token
              secret:
                secretName: image-pruner-token
