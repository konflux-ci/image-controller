---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: konflux-e2e-tests
spec:
  description: |-
    This pipeline automates the process of running end-to-end tests for image-controller
    using a Kind cluster running on AWS. The pipeline provisions the Kind cluster,
    installs Konflux, runs the tests, collects artifacts, and deprovisions the cluster.
  params:
    - name: SNAPSHOT
      description: 'The JSON string representing the snapshot of the application under test.'
      default: '{"components": [{"name":"test-app", "containerImage": "quay.io/example/repo:latest"}]}'
      type: string
    - name: test-name
      description: 'The name of the test corresponding to a defined Konflux integration test.'
      default: ''
    - name: konflux-test-infra-secret
      description: The name of secret where testing infrastructures credentials are stored.
      type: string
      default: 'konflux-test-infra'
    - name: oci-container-repo
      default: 'quay.io/konflux-test-storage/konflux-team/image-controller'
      description: The OCI container used to store all test artifacts.
    - name: component-image
      default: 'none'
      description: 'Container image built from the image-controller PR.'
    - name: artifact-browser-url
      description: "URL to the artifact browser deployment. If provided, a link will be added to PR comments."
      default: ""
      type: string
  tasks:
    - name: test-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test-metadata/0.4/test-metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: test-name
          value: $(context.pipelineRun.name)
    - name: provision-kind-cluster
      runAfter:
        - test-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/mapt-oci/kind-aws-spot/provision/0.2/kind-aws-provision.yaml
      params:
        - name: secret-aws-credentials
          value: mapt-kind-secret
        - name: cluster-access-secret-name
          value: kfg-$(context.pipelineRun.name)
        - name: id
          value: $(context.pipelineRun.name)
        - name: tags
          value: 'owner=konflux-devprod@redhat.com,project=Konflux,created-by=integration-pipeline,component=image-controller'
        - name: debug
          value: 'false'
        - name: ownerKind
          value: PipelineRun
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
        - name: oci-ref
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: credentials-secret-name
          value: $(params.konflux-test-infra-secret)
        - name: extra-port-mappings
          value: >-
            '[{\"containerPort\":30012,\"hostPort\":8180,\"protocol\":\"TCP\"}]'
        - name: cpus
          value: 16
        - name: memory
          value: 32
        - name: spot
          value: 'false'
        - name: harden-control-plane
          value: 'true'
    - name: deploy-konflux
      runAfter:
        - provision-kind-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/konflux-ci
          - name: revision
            value: main
          - name: pathInRepo
            value: .tekton/tasks/deploy-konflux/task.yaml
      params:
        - name: cluster-access-secret
          value: kfg-$(context.pipelineRun.name)
        - name: overrides-yaml
          value: |
            - name: image-controller
              git:
                - sourceRepo: konflux-ci/image-controller
                  remote:
                    repo: $(tasks.test-metadata.results.git-url)
                    ref: $(tasks.test-metadata.results.git-revision)
              images:
                - orig: quay.io/konflux-ci/image-controller
                  replacement: $(tasks.test-metadata.results.container-image)
        - name: konflux-ready-timeout
          value: "30m"
        - name: oci-container-repo
          value: $(params.oci-container-repo)
        - name: oci-container-repo-credentials-secret
          value: $(params.konflux-test-infra-secret)
        - name: pipeline-run-name
          value: $(context.pipelineRun.name)
    - name: image-controller-e2e-tests
      timeout: 2h
      runAfter:
        - deploy-konflux
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/image-controller.git
          - name: revision
            value: main
          - name: pathInRepo
            value: e2e-tests/tasks/image-controller-e2e.yaml
      params:
        - name: test-name
          value: $(context.pipelineRun.name)
        - name: git-url
          value: $(tasks.test-metadata.results.git-url)
        - name: git-revision
          value: $(tasks.test-metadata.results.git-revision)
        - name: oras-container
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: job-spec
          value: $(tasks.test-metadata.results.job-spec)
        - name: component-image
          value: "$(tasks.test-metadata.results.instrumented-container-image)"
        - name: cluster-access-secret-name
          value: kfg-$(context.pipelineRun.name)
        - name: test-environment
          value: "upstream"
  finally:
    - name: collect-and-upload-coverage
      params:
        - name: instrumented-images
          value: "$(tasks.test-metadata.results.instrumented-container-repo):$(tasks.test-metadata.results.instrumented-container-tag)"
        - name: cluster-access-secret-name
          value: kfg-$(context.pipelineRun.name)
        - name: test-name
          value: e2e-tests
        - name: oci-container
          value: "$(params.oci-container-repo):$(context.pipelineRun.name)-coverport"
        - name: codecov-flags
          value: e2e-tests
        - name: credentials-secret-name
          value: "image-controller-coverport-secrets"
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/coverport-coverage/0.1/coverport-coverage.yaml
      when:
        - input: $(tasks.image-controller-e2e-tests.status)
          operator: in
          values:
            - Succeeded
            - Failed
    - name: store-pipeline-status
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/store-pipeline-status/0.1/store-pipeline-status.yaml
      params:
        - name: oci-ref
          value: "$(params.oci-container-repo):$(context.pipelineRun.name)"
        - name: credentials-secret-name
          value: "$(params.konflux-test-infra-secret)"
        - name: pipelinerun-name
          value: $(context.pipelineRun.name)
        - name: pipeline-aggregate-status
          value: $(tasks.status)
    - name: deprovision-kind-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/mapt-oci/kind-aws-spot/deprovision/0.1/kind-aws-deprovision.yaml
      params:
        - name: secret-aws-credentials
          value: mapt-kind-secret
        - name: id
          value: $(context.pipelineRun.name)
        - name: cluster-access-secret
          value: kfg-$(context.pipelineRun.name)
        - name: oci-container
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: oci-credentials
          value: konflux-test-infra
    - name: pull-request-status-message
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/pull-request-comment/0.1/pull-request-comment.yaml
      params:
        - name: test-name
          value: $(context.pipelineRun.name)
        - name: oci-container
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: pipeline-aggregate-status
          value: $(tasks.status)
        - name: pull-request-author
          value: $(tasks.test-metadata.results.pull-request-author)
        - name: pull-request-number
          value: $(tasks.test-metadata.results.pull-request-number)
        - name: git-repo
          value: $(tasks.test-metadata.results.git-repo)
        - name: git-org
          value: $(tasks.test-metadata.results.git-org)
        - name: git-revision
          value: $(tasks.test-metadata.results.git-revision)
        - name: junit-report-name
          value: e2e-report.xml
        - name: e2e-log-name
          value: e2e-tests.log
        - name: cluster-provision-log-name
          value: kind-aws-provision.log
        - name: enable-test-results-analysis
          value: "true"
        - name: artifact-browser-url
          value: $(params.artifact-browser-url)
