codecov:
  require_ci_to_pass: false

ignore:
  - "**/zz_generated*.go"  # generated deepcopy code
  - "config/**"            # CRD, RBAC, and kustomize manifests
  - "vendor/**"            # vendored dependencies

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

comment:
  layout: "reach,diff,flags,files,footer"
  require_changes: true
